### General {{{
  # set-option scrollback history to 10000 (10k)
  set-option -g history-limit 10000
  # Highlight windows with activity in the status bar (window-status-activity
  # style), but no banner message
  set-window-option -g monitor-activity on
  set-option -g visual-activity off
  # set-option title, which is also showed at iTerm tab
  # #T      = standard window title (last command, see ~/.bash_profile)
  # #h      = short hostname
  # #S      = session name
  # #I      = tmux window index
  # #W      = tmux window name
  # Attempt to set the window title using xterm code if tmux detects using xterm
  set-option -g set-titles on
  set-option -g set-titles-string "#S — #W"
  # Auto-name windows (#W) as "command·folder", folder truncated to 12 chars;
  # bare version numbers map to "claude" (Claude Code's binary is named after
  # its version). #() is not re-evaluated here, so the richer interpreter
  # resolution (node -> codex/npm) lives in window-status-format instead.
  set-window-option -g automatic-rename-format "#{s|^[0-9][0-9.]*$|claude|:pane_current_command}·#{=/12/…:#{b:pane_current_path}}"

  # Enable true color (24-bit RGB) so `#rrggbb` values render exactly
  # instead of being rounded to the nearest 256-color palette entry.
  set-option -g default-terminal "tmux-256color"
  set-option -ag terminal-overrides ",xterm-*:RGB"
  set-option -as terminal-overrides ',xterm*:sitm=\E[3m'
### }}}

### Key Bindings {{{
# request extended key sequences (XTerm's modifyOtherKeys mode)
  set -s extended-keys on
  set -as terminal-features 'xterm*:extkeys'

  # kitty keyboard protocol passthrough
  set -g allow-passthrough on

  # Key combination prefix is <C-a>, not <C-b>
  set-option -g prefix C-a
  unbind-key C-b
  # Use send-prefix to pass C-a through to application
  bind C-a send-prefix

  # Reload ~/.tmux.conf using PREFIX r; surfaces the first error instead of
  # claiming success unconditionally
  bind r run-shell 'if out=$(tmux source-file ~/.tmux.conf 2>&1); then tmux display "TMUX configuration is reloaded!"; else tmux display "Config ERROR: $out"; fi'

  # Reduce the command delay time to something a bit shorter
  set-option -sg escape-time 0
  # Disallow multiple commands to be entered without pressing the prefix-key again
  set-option -sg repeat-time 0

  # Use vi-style key bindings in copy and choice modes
  set-window-option -g mode-keys vi
  # Use vi-style key bindings in the status line (command mode)
  set-option -g status-keys vi
  # Setup 'v' to begin selection as in Vim
  bind-key -T copy-mode-vi 'v' send -X begin-selection
  bind-key -T copy-mode-vi 'y' send -X copy-selection
  # Paste uses the tmux default PREFIX ] (P is taken by previous-session below)

  # '@pane-is-vim' is a pane-local option that is set by the plugin on load,
  # and unset when Neovim exits or suspends; note that this means you'll probably
  # not want to lazy-load smart-splits.nvim, as the variable won't be set until
  # the plugin is loaded

  # Smart pane switching with awareness of Neovim splits.
  bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h'  'select-pane -L'
  bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j'  'select-pane -D'
  bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k'  'select-pane -U'
  bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l'  'select-pane -R'

  # C-l is taken by pane navigation above, so C-; passes a clear-screen
  # through to the shell (needs extended-keys, enabled above)
  bind-key -n 'C-;' send-keys C-l

  bind-key -n 'C-\' if -F "#{@pane-is-vim}" 'send-keys C-\\'  'select-pane -l'

  bind-key -T copy-mode-vi 'C-h' select-pane -L
  bind-key -T copy-mode-vi 'C-j' select-pane -D
  bind-key -T copy-mode-vi 'C-k' select-pane -U
  bind-key -T copy-mode-vi 'C-l' select-pane -R
  bind-key -T copy-mode-vi 'C-\' select-pane -l
  bind-key -T copy-mode-vi 'C-Space' select-pane -t:.+

  # Silently kill pane when idle, confirmation prompt when a process is running
  bind-key x if-shell \
  '[ "#{pane_current_command}" = "$(basename $SHELL)" ]' \
  'kill-pane' \
  'confirm-before -p "Process \"#{pane_current_command}\" running. Kill pane? (y/n)" kill-pane'

  # Window cycling uses the tmux defaults: PREFIX p / PREFIX n

  # Resize panes with PREFIX arrows: the arrow drags the pane's divider in
  # that direction, snapping to fraction stops (25/33/50/67/75% of the
  # window). The first press enters a sticky 'resize' key table, so further
  # bare arrows keep resizing; any other key (or Escape) exits the mode.
  # (switch-client runs before run-shell: key dispatch resets the table to
  # root, so re-arm it first or the async resize redraw flickers the
  # [resize] status indicator)
  bind Right switch-client -T resize \; run-shell "~/dotfiles/tmux/tmux-resize.sh right '#{pane_width}'  '#{window_width}'  '#{pane_id}' '#{pane_at_right}'  '#{pane_at_left}'"
  bind Left  switch-client -T resize \; run-shell "~/dotfiles/tmux/tmux-resize.sh left  '#{pane_width}'  '#{window_width}'  '#{pane_id}' '#{pane_at_right}'  '#{pane_at_left}'"
  bind Down  switch-client -T resize \; run-shell "~/dotfiles/tmux/tmux-resize.sh down  '#{pane_height}' '#{window_height}' '#{pane_id}' '#{pane_at_bottom}' '#{pane_at_top}'"
  bind Up    switch-client -T resize \; run-shell "~/dotfiles/tmux/tmux-resize.sh up    '#{pane_height}' '#{window_height}' '#{pane_id}' '#{pane_at_bottom}' '#{pane_at_top}'"
  bind -T resize Right switch-client -T resize \; run-shell "~/dotfiles/tmux/tmux-resize.sh right '#{pane_width}'  '#{window_width}'  '#{pane_id}' '#{pane_at_right}'  '#{pane_at_left}'"
  bind -T resize Left  switch-client -T resize \; run-shell "~/dotfiles/tmux/tmux-resize.sh left  '#{pane_width}'  '#{window_width}'  '#{pane_id}' '#{pane_at_right}'  '#{pane_at_left}'"
  bind -T resize Down  switch-client -T resize \; run-shell "~/dotfiles/tmux/tmux-resize.sh down  '#{pane_height}' '#{window_height}' '#{pane_id}' '#{pane_at_bottom}' '#{pane_at_top}'"
  bind -T resize Up    switch-client -T resize \; run-shell "~/dotfiles/tmux/tmux-resize.sh up    '#{pane_height}' '#{window_height}' '#{pane_id}' '#{pane_at_bottom}' '#{pane_at_top}'"


  # Open window with currrent path
  bind c new-window -c '#{pane_current_path}'
  # Use PREFIX | to split window horizontally and PREFIX - to split vertically
  bind v split-window -h -c '#{pane_current_path}'
  bind s split-window -v -c '#{pane_current_path}'

# Sessions {{
  # When a session is destroyed (killed, or its last pane exits), switch the
  # client to the most recently used remaining session instead of detaching
  # back to the bare terminal
  set-option -g detach-on-destroy off
  # Rebind session list (was prefix+s, moved to prefix+l)
  bind l choose-session
  # Cycle sessions with PREFIX N / PREFIX P
  bind N switch-client -n
  bind P switch-client -p
  # PREFIX C: instantly create a new session (auto-numbered, no naming prompt),
  # starting in the current pane's directory. Rename later with PREFIX $.
  bind C new-session -c '#{pane_current_path}'
  # PREFIX $: rename the current session in a centered popup,
  # pre-filled with the current name (esc cancels)
  bind '$' display-popup -E -w 44 -h 6 -T ' rename session ' '~/dotfiles/tmux/tmux-sessions.sh --rename'
  # PREFIX q: quick window switcher — centered menu of this session's
  # windows; press a window's number to jump instantly (replaces the
  # display-panes default, pane jumps are C-h/j/k/l anyway)
  bind q run-shell "~/dotfiles/tmux/tmux-sessions.sh --quick '#{client_name}'"
  # PREFIX f: fzf session/window navigator in a floating popup (open sessions
  # with their windows nested; enter switches, ctrl-x kills, typed name
  # creates a new session)
  bind f display-popup -E -w 75% -h 60% -T ' sessions ' '~/dotfiles/tmux/tmux-sessions.sh'
  # PREFIX o: fzf project picker (projectile-style discovery in
  # ~/Documents/projects; enter creates a session there and switches)
  bind o display-popup -E -w 75% -h 60% -T ' projects ' '~/dotfiles/tmux/tmux-sessions.sh --projects'
  # PREFIX X: kill the current session and land in the previous one
  # (courtesy of detach-on-destroy off above; pane kill is on PREFIX x)
  bind X confirm-before -p "Kill session '#S'? (y/n)" kill-session
# }}

  # Make the current window the first window
  bind T swap-window -t 1

  # If enabled, use mouse control in TMUX
  set-window-option -g mouse on
### }}}

### Appereance {{{
  # Let window numbers be 1-indexed
  set-option -g base-index 1
  # Automatically renumber window numbers on closing a pane (tmux >= 1.7)
  set-option -g renumber-windows on
  # Enable focus events for terminal that support them
  set-option -g focus-events on
  # (activity notifications are configured in the General section)
  # Display tmux messages for 2 seconds
  set-option -g display-time 2000
  # Enable aggressive-resize that is super useful when using grouped sessions and multi-monitor
  set-window-option -g aggressive-resize on

  ## Colorscheme: carbonfox (EdenEast/nightfox.nvim) {{
  #   bg0 #0c0c0c  bg1 #161616  bg2 #252525  bg3 #353535  bg4 #535353
  #   fg1 #f2f4f8  fg2 #b6b8bb  fg3 #7b7c7e  comment #6e6f70  sel1 #525253
  #   red #ee5396  green #25be6a  yellow #08bdba  blue #78a9ff
  #   magenta #be95ff  cyan #33b1ff  orange #3ddbd9  pink #ff7eb6
  ## }}

  ## Window {{
    # Copy-mode selection
    set-window-option -g mode-style fg=#f2f4f8,bg=#525253

    # Clock Mode {{
      # Set the clock colors
      set-window-option -g clock-mode-colour "#78a9ff"
      # Set clock hour format
      set-window-option -g clock-mode-style 24
    # }}

    # Display Panes {{
      # Set the indicator colors for the active pane
      set-option -g display-panes-active-colour "#78a9ff"
      # Set the indicator colors for the inactive pane
      set-option -g display-panes-colour "#535353"
    # }}
  ## }}

  ## Pane {{
    # Let pane numbers be 1-indexed
    set-option -g pane-base-index 1

    # Set border colors for the inactive pane
    set-option -g pane-border-style fg=#252525,bg=default
    # Set border colors for the active pane
    set-option -g pane-active-border-style fg=#535353,bg=default
  ## }}

  ## Status Line {{
    # Turn the status line on
    set-option -g status on
    # Show the status line at the top of the screen
    set-option -g status-position top
    # Update status every 5 seconds
    set-option -g status-interval 5
    # Set colors and attributes for the status line
    set-option -g status-style fg=#b6b8bb,bg=default,none

    # Window List {{
      ## Window List
      # Window list sits right after the session name
      set-option -g status-justify left

      # Gap between window entries
      set-window-option -g window-status-separator " "

      # Window labels are computed live by tmux-label.sh (resolves
      # interpreters to the script they run, e.g. node -> codex/npm), since
      # #() only refreshes reliably in status formats. Manually renamed
      # windows (automatic-rename off) show their given name instead.
      # Inactive window: index in a grey block, dim name
      set-window-option -g window-status-format "#[fg=#b6b8bb,bg=#353535] #I #[fg=#7b7c7e,bg=default] #{?automatic-rename,#(~/dotfiles/tmux/tmux-label.sh '#{pane_pid}' '#{pane_current_command}')·#{=/12/…:#{b:pane_current_path}},#W} "

      # Current window: index in a magenta block, bright name
      set-window-option -g window-status-current-format "#[fg=#161616,bg=#be95ff,bold] #I #[fg=#f2f4f8,bg=default,bold] #{?automatic-rename,#(~/dotfiles/tmux/tmux-label.sh '#{pane_pid}' '#{pane_current_command}')·#{=/12/…:#{b:pane_current_path}},#W} "

      # Set colors and attributes for the status text of window which have an activity
      set-window-option -g window-status-activity-style fg=#08bdba,bg=default,bold
    # }

    # Left {{
      # Session name, plus a [resize] indicator while the sticky resize
      # key table is active
      set-option -g status-left-length 40
      set-option -g status-left "#[fg=#161616,bg=#78a9ff,bold] #S #[default] "
      set-option -ga status-left "#{?#{==:#{client_key_table},resize},#[fg=#161616 bg=#ee5396 bold] resize #[default] ,}"
    # }

    # Right {{
      # prefix indicator / cwd folder name / git branch (+ * when dirty) / clock
      set-option -g status-right-length 80
      set-option -g status-right "#{prefix_highlight}"
      set-option -ga status-right '#[fg=#33b1ff] #{b:pane_current_path}#[default]'
      set-option -ga status-right '#[fg=#be95ff]#(cd "#{pane_current_path}" 2>/dev/null || exit 0; b=$(git symbolic-ref --short HEAD 2>/dev/null) || exit 0; d=""; [ -n "$(git status --porcelain 2>/dev/null | head -1)" ] && d="*"; echo "  $b$d")#[default]'
      set-option -ga status-right "#[fg=#7b7c7e]  %a %I:%M %p "
    # }

    # Message {{
      # Set colors and attributes for status line messages (confirm prompts,
      # "config reloaded" flash, etc.)
      set-option -g message-style fg=#161616,bg=#08bdba,bold
      # Command-mode input (prefix + :) uses its own style
      set-option -g message-command-style fg=#f2f4f8,bg=#2a2a2a
    # }
  ## }}
### }}}

### Plugins {{{
  # List of plugins
  # Supports `github_username/repo` or full URL
  # Examples:
  # github_username/plugin_name
  # git@github.com/user/plugin
  # git@bitbucket.cmo/user/plugin
  set-option -g @plugin 'tmux-plugins/tpm'
  set-option -g @plugin 'tmux-plugins/tmux-open'
  set-option -g @plugin 'tmux-plugins/tmux-resurrect'
  set-option -g @plugin 'tmux-plugins/tmux-continuum'
  set-option -g @plugin 'tmux-plugins/tmux-prefix-highlight'

  ## Shortcuts of plugins
  # TPM
  # <prefix> + I: installs new plugins from GitHub or any other git repository
  # <prefix> + U: updates plugins
  # <prefix> + alt-u: remove/uninstall plugins not on the plugin list
  # (native search replaces copycat: <prefix> + [ then / or ? in vi mode)
  # Open
  # o: open a highlighted selection with the system default program (open for OS X)
  # ctrl-o: open a highlighted selection with the $EDITOR
  # Resurrect
  # <prefix> + ctrl-s: save
  # <prefix> + ctrl-r: restore

  ## Plugin: Prefix Highlight {{
    # Match the carbonfox status line
    set-option -g @prefix_highlight_fg '#161616'
    set-option -g @prefix_highlight_bg '#08bdba'
    set-option -g @prefix_highlight_show_copy_mode 'on'
    set-option -g @prefix_highlight_copy_mode_attr 'fg=#161616,bg=#78a9ff'
    set-option -g @prefix_highlight_output_suffix ' '
  ## }}

  ## Plugin: Resurrect {{
    # set-option directory to save TMUX environments
    set-option -g @resurrect-dir '~/.tmux-resurrect'
    # Enable saving and restoring tmux pane contents
    set-option -g @resurrect-capture-pane-contents 'on'
    # Configuration for advanced restoring
    set-option -g @resurrect-processes '          \
      vi vim nvim gvim emacs man less more tail   \
      top htop glances iotop iftop sudo           \
      ssh irssi weechat weechat-curses mutt       \
      python ipython git tig mysql sqlite3 psql   \
    '
  ## }}
  # Initializes TMUX plugin manager.
  # Keep this line at the very bottom of tmux.conf
  run '~/.tmux/plugins/tpm/tpm'
### }}}
